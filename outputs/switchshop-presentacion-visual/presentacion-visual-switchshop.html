<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SwitchShop - Presentacion visual</title>
  <style>
    :root{
      --ink:#111827; --muted:#6b7280; --line:#e5e7eb; --paper:#fbfaf7; --white:#fff;
      --green:#10b981; --teal:#0f766e; --gold:#d6a545; --blue:#1e3a8a; --stone:#292524;
      --soft:#f3f4f6; --cream:#fff7ed; --mint:#ecfdf5; --rose:#fff1f2;
    }
    *{box-sizing:border-box} body{margin:0;background:#e7e5e4;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--ink)}
    .deck{display:flex;flex-direction:column;gap:22px;padding:22px}.slide{width:1280px;height:720px;margin:0 auto;background:var(--paper);position:relative;overflow:hidden;box-shadow:0 20px 60px #0002;padding:46px 58px}.shot-mode{padding:0}.shot-mode .slide{margin:0;box-shadow:none}
    .kicker{font-size:12px;letter-spacing:.22em;text-transform:uppercase;font-weight:800;color:var(--teal)}
    h1{font-family:Georgia,serif;font-size:60px;line-height:1.02;margin:14px 0 18px;color:#0c0a09;letter-spacing:-.02em} h2{font-family:Georgia,serif;font-size:40px;line-height:1.08;margin:8px 0 18px;color:#0c0a09} h3{margin:0 0 8px;font-size:18px} p{font-size:22px;line-height:1.45;color:#44403c;margin:0 0 14px}.small{font-size:14px;color:var(--muted);line-height:1.45}.tiny{font-size:11px;color:#78716c}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:14px;background:#0c0a09;color:white;display:grid;place-items:center;font-weight:900}.tag{display:inline-flex;gap:8px;align-items:center;background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}.grid2{display:grid;grid-template-columns:1.05fr .95fr;gap:42px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{background:white;border:1px solid #e7e5e4;border-radius:18px;padding:20px;box-shadow:0 10px 24px #0c0a0910}.metric{font-size:40px;font-weight:900;color:#0f766e;margin-bottom:4px}.rail{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:22px}.rail .card{padding:16px}.hero-bg{position:absolute;inset:0;background:radial-gradient(circle at 20% 10%,#d1fae5,transparent 28%),linear-gradient(135deg,#fff7ed 0%,#f5f5f4 48%,#ecfeff 100%)}.hero-content{position:relative;z-index:1}.phone{width:280px;height:560px;border:10px solid #111;border-radius:36px;background:white;box-shadow:0 30px 80px #0003;overflow:hidden}.browser{background:white;border:1px solid #ddd6d1;border-radius:20px;overflow:hidden;box-shadow:0 28px 70px #0c0a0920}.bar{height:38px;background:#f5f5f4;border-bottom:1px solid #e7e5e4;display:flex;align-items:center;gap:8px;padding:0 14px}.dot{width:10px;height:10px;border-radius:50%;background:#d6d3d1}.nav{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid #f1f1f1}.nav .name{font-family:Georgia,serif;font-weight:900;font-size:22px}.pill{padding:8px 12px;border-radius:999px;background:#111827;color:white;font-size:12px;font-weight:800}.store-hero{height:210px;background:linear-gradient(135deg,#1c1917,#0f766e);color:white;padding:28px;display:flex;align-items:end}.store-hero h3{font-family:Georgia,serif;font-size:34px;color:white}.products{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:18px}.product{border:1px solid #eee;border-radius:14px;padding:10px}.img{height:70px;border-radius:10px;background:linear-gradient(135deg,#d6a545,#fef3c7)}.price{font-weight:900;color:#0f766e}.admin{display:grid;grid-template-columns:210px 1fr;height:520px}.side{background:#111827;color:white;padding:20px}.side .item{padding:10px 12px;border-radius:10px;margin:5px 0;font-size:13px;color:#d1d5db}.side .active{background:#10b981;color:white;font-weight:800}.panel{padding:22px;background:#fafaf9}.topline{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.chart{height:150px;border-radius:16px;background:linear-gradient(180deg,#ecfdf5,#fff);border:1px solid #d1fae5;display:flex;align-items:end;gap:14px;padding:18px}.barv{width:36px;background:#10b981;border-radius:8px 8px 0 0}.list{margin-top:16px;background:white;border:1px solid #e7e5e4;border-radius:16px;overflow:hidden}.row{display:grid;grid-template-columns:1.3fr .8fr .7fr .5fr;gap:12px;padding:13px 16px;border-bottom:1px solid #f1f1f1;font-size:13px}.row.head{background:#f8fafc;font-weight:900;color:#475569}.badge{display:inline-block;border-radius:999px;padding:4px 8px;background:#dcfce7;color:#166534;font-weight:800;font-size:11px}.module-icon{width:42px;height:42px;border-radius:12px;background:#111827;color:white;display:grid;place-items:center;font-weight:900}.flow{display:flex;align-items:center;justify-content:space-between;margin-top:34px}.step{width:160px;text-align:center}.circle{width:72px;height:72px;border-radius:24px;background:#fff;border:1px solid #e7e5e4;box-shadow:0 14px 30px #0001;display:grid;place-items:center;margin:0 auto 10px;font-size:28px}.arrow{height:2px;background:#cbd5e1;flex:1;margin:0 12px;position:relative}.arrow:after{content:"";position:absolute;right:0;top:-4px;border-left:8px solid #cbd5e1;border-top:5px solid transparent;border-bottom:5px solid transparent}.quote{font-family:Georgia,serif;font-size:34px;line-height:1.18;color:#0c0a09}.screenshot-title{position:absolute;left:34px;top:26px;font-size:13px;text-transform:uppercase;letter-spacing:.18em;font-weight:900;color:#78716c}.shot{padding-top:58px}.print-note{position:fixed;right:18px;bottom:18px;background:#111;color:white;padding:10px 12px;border-radius:10px;font-size:12px;opacity:.85}
    @media print{body{background:white}.deck{padding:0;gap:0}.slide{box-shadow:none;margin:0;page-break-after:always}.print-note{display:none}}
  </style>
</head>
<body>
<div id="deck" class="deck"></div><div class="print-note">Tip: Ctrl+P para guardar como PDF</div>
<script>
const modules={
store:{label:'Tienda publica', icon:'🛒', desc:'Vitrina digital para que el cliente vea productos, marca y carrito.', active:'Tienda'},
dashboard:{label:'Panel principal', icon:'📊', desc:'Vista general del negocio y acceso rapido a la operacion.', active:'Dashboard'},
inventory:{label:'Inventario', icon:'📦', desc:'Productos, precios, stock, categorias e imagenes.', active:'Inventario'},
orders:{label:'Pedidos', icon:'🧾', desc:'Seguimiento de pedidos, pago, despacho y estado comercial.', active:'Pedidos'},
customers:{label:'Clientes', icon:'👥', desc:'Clientes aprobados, solicitudes y datos de contacto.', active:'Clientes'},
receivables:{label:'Cuentas por cobrar', icon:'💳', desc:'Saldos, pagos parciales y cartera por cliente.', active:'Cartera'},
logistics:{label:'Logistica', icon:'🚚', desc:'Ciudades, ubicaciones y costos de envio.', active:'Logistica'},
settings:{label:'Configuracion de tienda', icon:'🎨', desc:'Logo, nombre, banner, colores y textos de marca.', active:'Configuracion'},
users:{label:'Usuarios y permisos', icon:'🔐', desc:'Accesos internos por empresa, rol y estado.', active:'Usuarios'}
};
function shell(active='Dashboard', content='dashboard'){
 const items=['Dashboard','Inventario','Compras','Pedidos','Clientes','Cartera','Logistica','Configuracion','Usuarios'];
 return `<div class="browser"><div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="tiny">switchshop.app/panel</span></div><div class="admin"><div class="side"><div class="brand"><div class="logo">S</div><b>SwitchShop</b></div><div style="height:18px"></div>${items.map(i=>`<div class="item ${i==active?'active':''}">${i}</div>`).join('')}</div><div class="panel">${content}</div></div></div>`
}
function dashboard(){return `<div class="topline"><div><div class="kicker">Operacion</div><h3>Panel de control</h3></div><span class="pill">Ocean Glow</span></div><div class="statrow"><div class="card"><div class="metric">24</div><div class="small">Pedidos</div></div><div class="card"><div class="metric">$8.4k</div><div class="small">Ventas</div></div><div class="card"><div class="metric">16</div><div class="small">Clientes</div></div><div class="card"><div class="metric">92%</div><div class="small">Stock sano</div></div></div><div class="chart"><div class="barv" style="height:50px"></div><div class="barv" style="height:90px"></div><div class="barv" style="height:68px"></div><div class="barv" style="height:120px"></div><div class="barv" style="height:84px"></div><div class="barv" style="height:132px"></div></div><div class="list"><div class="row head"><span>Actividad</span><span>Cliente</span><span>Estado</span><span>Total</span></div><div class="row"><span>Pedido #1042</span><span>Maria Ruiz</span><span><b class="badge">Pagado</b></span><span>$64</span></div><div class="row"><span>Reposicion</span><span>Inventario</span><span><b class="badge">Listo</b></span><span>32 u.</span></div></div>`}
function table(active){return `<div class="topline"><div><div class="kicker">Modulo</div><h3>${active}</h3></div><button class="pill">+ Nuevo</button></div><div class="list"><div class="row head"><span>Registro</span><span>Detalle</span><span>Estado</span><span>Accion</span></div><div class="row"><span>${active} principal</span><span>Gestion operativa</span><span><b class="badge">Activo</b></span><span>Editar</span></div><div class="row"><span>Solicitud pendiente</span><span>Revision requerida</span><span><b class="badge" style="background:#fef3c7;color:#92400e">Pendiente</b></span><span>Ver</span></div><div class="row"><span>Actualizacion</span><span>Sincronizado con tienda</span><span><b class="badge">OK</b></span><span>Detalle</span></div></div><div class="grid3" style="margin-top:16px"><div class="card"><div class="module-icon">1</div><h3>Orden</h3><p class="small">Datos centralizados.</p></div><div class="card"><div class="module-icon">2</div><h3>Control</h3><p class="small">Estados claros.</p></div><div class="card"><div class="module-icon">3</div><h3>Accion</h3><p class="small">Gestion rapida.</p></div></div>`}
function storeMock(){return `<div class="browser"><div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="tiny">switchshop.app/tienda/ocean-glow</span></div><div class="nav"><div class="brand"><div class="logo">O</div><div class="name">Ocean Glow</div></div><span class="pill">Carrito 2</span></div><div class="store-hero"><div><div class="tag">Nuevo catalogo</div><h3>Calidad, estilo y compra simple</h3><p style="color:#e7e5e4;font-size:16px">Productos listos para explorar, elegir y pedir.</p></div></div><div class="products"><div class="product"><div class="img"></div><h3>Producto premium</h3><p class="small">Categoria</p><div class="price">$24.00</div></div><div class="product"><div class="img" style="background:linear-gradient(135deg,#0f766e,#ccfbf1)"></div><h3>Edicion especial</h3><p class="small">Categoria</p><div class="price">$18.50</div></div><div class="product"><div class="img" style="background:linear-gradient(135deg,#111827,#cbd5e1)"></div><h3>Mas vendido</h3><p class="small">Categoria</p><div class="price">$31.00</div></div></div></div>`}
function slideCover(){return `<section class="slide"><div class="hero-bg"></div><div class="hero-content grid2"><div><div class="brand"><div class="logo">S</div><b>SwitchShop</b></div><h1>Una tienda online con el control completo del negocio.</h1><p>Presentacion visual para mostrar como SwitchShop ayuda a vender, administrar, entregar y cobrar desde una sola plataforma.</p><div class="rail"><div class="card"><b>Tienda</b><p class="small">Catalogo publico</p></div><div class="card"><b>Gestion</b><p class="small">Panel privado</p></div><div class="card"><b>Control</b><p class="small">Roles y empresas</p></div><div class="card"><b>Crecimiento</b><p class="small">Operacion ordenada</p></div></div></div><div style="display:flex;justify-content:center">${storeMock()}</div></div></section>`}
function slideValue(){return `<section class="slide"><div class="kicker">Propuesta de valor</div><h2>SwitchShop convierte ventas dispersas en una operacion clara.</h2><div class="grid3"><div class="card"><div class="metric">1</div><h3>Vende mejor</h3><p class="small">La tienda publica presenta productos, marca y carrito con una experiencia mas profesional.</p></div><div class="card"><div class="metric">2</div><h3>Administra mejor</h3><p class="small">Inventario, pedidos, clientes, pagos y entregas se trabajan desde el panel privado.</p></div><div class="card"><div class="metric">3</div><h3>Controla accesos</h3><p class="small">Los usuarios internos no gestionan empresas hasta que un administrador los habilita.</p></div></div><div class="flow"><div class="step"><div class="circle">🛍️</div><b>Cliente compra</b></div><div class="arrow"></div><div class="step"><div class="circle">🧾</div><b>Pedido entra</b></div><div class="arrow"></div><div class="step"><div class="circle">📦</div><b>Inventario se mueve</b></div><div class="arrow"></div><div class="step"><div class="circle">💳</div><b>Cobro se controla</b></div></div></section>`}
function slideShot(key){let m=modules[key];let content=key==='dashboard'?dashboard():table(m.active);let visual=key==='store'?storeMock():shell(m.active,content);return `<section class="slide shot"><div class="screenshot-title">${m.label}</div><div class="grid2"><div><div class="module-icon">${m.icon}</div><h2>${m.label}</h2><p>${m.desc}</p><div class="card"><h3>Como explicarlo al cliente</h3><p class="small">Este modulo demuestra que la plataforma no solo muestra productos: tambien organiza el trabajo diario del negocio.</p></div></div><div>${visual}</div></div></section>`}
function slideModules(){return `<section class="slide"><div class="kicker">Mapa de modulos</div><h2>Un sistema completo para la operacion comercial.</h2><div class="grid3">${Object.values(modules).map(m=>`<div class="card"><div class="module-icon">${m.icon}</div><h3>${m.label}</h3><p class="small">${m.desc}</p></div>`).join('')}</div></section>`}
function slideClose(){return `<section class="slide"><div class="grid2"><div><div class="kicker">Cierre comercial</div><h2>La diferencia no es solo tener una tienda. Es operar con orden.</h2><p class="quote">“SwitchShop une la vitrina del cliente con el motor interno del negocio.”</p></div><div class="card"><h3>Demostracion recomendada</h3>${['Mostrar la tienda publica','Crear o editar un producto','Simular un pedido','Revisar clientes y cartera','Cerrar con configuracion y usuarios'].map(x=>`<p>✓ ${x}</p>`).join('')}</div></div></section>`}
const order=['cover','value','store','dashboard','inventory','orders','customers','receivables','logistics','settings','users','modules','close'];
function render(){const q=new URLSearchParams(location.search);const shot=q.get('shot');document.body.classList.toggle('shot-mode',!!shot);let html='';if(!shot){html=slideCover()+slideValue()+['store','dashboard','inventory','orders','customers','receivables','logistics','settings','users'].map(slideShot).join('')+slideModules()+slideClose()}else if(shot==='cover')html=slideCover();else if(shot==='value')html=slideValue();else if(shot==='modules')html=slideModules();else if(shot==='close')html=slideClose();else html=slideShot(shot);document.getElementById('deck').innerHTML=html}
render();
</script>
</body>
</html>
